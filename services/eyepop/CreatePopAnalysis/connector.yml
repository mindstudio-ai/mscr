apiVersion: v1
kind: Action
id: create-pop-analysis
serviceId: eyepop
active: true
metadata:
  name: Analyze Visual Content
  description: Analyze images or videos using EyePop.ai's visual intelligence platform with composable Pops
  quickHelp: readme.md
configuration:
  - title: Content Settings
    items:
      - label: Content URL
        helpText: URL to the image or video you want to analyze
        variable: contentUrl
        required: true
        type: text
        placeholder: https://example.com/image.jpg
      - label: Content Type
        helpText: The type of content you are analyzing
        variable: contentType
        required: true
        type: select
        defaultValue: image
        selectOptions:
          options:
            - label: Image
              value: image
            - label: Video
              value: video
      - label: Composable Pop Configuration
        helpText: Enter your composable Pop configuration as JSON. Define the AI models and pipeline components to use for analysis.
        variable: popConfiguration
        required: true
        type: textarea
        placeholder: |
          {
            "components": [
              {
                "type": "inference",
                "model": "eyepop.person:latest"
              }
            ]
          }
  - title: Output Settings
    items:
      - label: Output Variable
        helpText: Variable name to store the analysis results
        variable: outputVariable
        required: true
        type: outputVariableName
